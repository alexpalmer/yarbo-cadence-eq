# =============================================================================
#  YARBO CADENCE EQ DASHBOARD
# =============================================================================
#  HOW TO ADD:
#    Settings -> Dashboards -> + New dashboard -> (name it) -> Open it ->
#    top-right pencil (Edit) -> 3-dot menu -> "Raw configuration editor" ->
#    paste EVERYTHING below -> Save.
#
#  Uses ONLY built-in cards (no HACS required).
#
#  Two views:
#    - "Yarbo Cadence EQ"  : full 3-column desktop layout
#    - "Phone"             : single-column, priority-ordered for mobile
#
#  Assumes the package (yarbo_cadence_eq.yaml) is installed and entities exist.
# =============================================================================

title: Yarbo Cadence EQ
views:

  # ###########################################################################
  # VIEW 1 — DESKTOP (3 columns)
  # ###########################################################################
  - title: Yarbo Cadence EQ
    path: mowing
    icon: mdi:robot-mower
    badges: []
    cards:

      # =====================================================================
      # LEFT COLUMN: controls, tuning, cadence
      # =====================================================================
      - type: vertical-stack
        cards:

          # ---- CONTROLS -------------------------------------------------------
          - type: entities
            title: Controls
            show_header_toggle: false
            state_color: true
            entities:
              - entity: input_boolean.yarbocadenceeq_auto_enabled
                name: 🟢 Mowing (master — expose to HomeKit)
              - entity: select.yarbocadenceeq_plan_select
                name: Plan to run (from Yarbo)
              - type: divider
              - entity: input_number.yarbocadenceeq_active_plan_slot
                name: Running slot (system — 0=idle)
              - entity: sensor.yarbocadenceeq_plan_1_hours_since_last_cut
                name: Hours since last cut · Slot 1
              - entity: sensor.yarbocadenceeq_plan_2_hours_since_last_cut
                name: Hours since last cut · Slot 2
              - entity: sensor.yarbocadenceeq_plan_3_hours_since_last_cut
                name: Hours since last cut · Slot 3
              - entity: sensor.yarbocadenceeq_plan_4_hours_since_last_cut
                name: Hours since last cut · Slot 4

          # ---- TUNING (grouped sub-sections) ----------------------------------
          - type: entities
            title: Tuning
            show_header_toggle: false
            entities:
              - entity: input_text.yarbocadenceeq_device_slug
                name: Yarbo entity slug
              - entity: input_text.yarbocadenceeq_weather_entity
                name: Weather source (blank = auto)
              - entity: input_number.yarbocadenceeq_rain_prob_threshold
                name: Rain probability limit (%)
              - entity: input_number.yarbocadenceeq_min_battery_percent
                name: Min battery to dispatch
              - entity: input_boolean.yarbocadenceeq_allow_medium_rtk
                name: Allow Medium rtk (off = Strong only)

              - type: section
                label: Plan Slots
              - type: section
                label: Slot 1
              - entity: input_boolean.yarbocadenceeq_plan1_enabled
                name: Slot 1 enabled
              - entity: input_text.yarbocadenceeq_plan1_yarbo_plan
                name: Slot 1 Yarbo plan name
              - entity: input_datetime.yarbocadenceeq_plan1_earliest_start
                name: Slot 1 earliest start time
              - entity: input_datetime.yarbocadenceeq_plan1_latest_start
                name: Slot 1 latest start time
              - entity: input_datetime.yarbocadenceeq_plan1_last_cut
                name: Slot 1 last cut completed
              - entity: input_number.yarbocadenceeq_plan1_interval_hours
                name: Slot 1 target interval (h)
              - entity: input_number.yarbocadenceeq_plan1_min_gap_hours
                name: Slot 1 min gap (h)
              - entity: input_number.yarbocadenceeq_plan1_cut_hours
                name: Slot 1 avg run time (h)
              - entity: input_number.yarbocadenceeq_plan1_buffer_hours
                name: Slot 1 buffer (h)

              - type: section
                label: Slot 2
              - entity: input_boolean.yarbocadenceeq_plan2_enabled
                name: Slot 2 enabled
              - entity: input_text.yarbocadenceeq_plan2_yarbo_plan
                name: Slot 2 Yarbo plan name
              - entity: input_datetime.yarbocadenceeq_plan2_earliest_start
                name: Slot 2 earliest start time
              - entity: input_datetime.yarbocadenceeq_plan2_latest_start
                name: Slot 2 latest start time
              - entity: input_datetime.yarbocadenceeq_plan2_last_cut
                name: Slot 2 last cut completed
              - entity: input_number.yarbocadenceeq_plan2_interval_hours
                name: Slot 2 target interval (h)
              - entity: input_number.yarbocadenceeq_plan2_min_gap_hours
                name: Slot 2 min gap (h)
              - entity: input_number.yarbocadenceeq_plan2_cut_hours
                name: Slot 2 avg run time (h)
              - entity: input_number.yarbocadenceeq_plan2_buffer_hours
                name: Slot 2 buffer (h)

              - type: section
                label: Slot 3
              - entity: input_boolean.yarbocadenceeq_plan3_enabled
                name: Slot 3 enabled
              - entity: input_text.yarbocadenceeq_plan3_yarbo_plan
                name: Slot 3 Yarbo plan name
              - entity: input_datetime.yarbocadenceeq_plan3_earliest_start
                name: Slot 3 earliest start time
              - entity: input_datetime.yarbocadenceeq_plan3_latest_start
                name: Slot 3 latest start time
              - entity: input_datetime.yarbocadenceeq_plan3_last_cut
                name: Slot 3 last cut completed
              - entity: input_number.yarbocadenceeq_plan3_interval_hours
                name: Slot 3 target interval (h)
              - entity: input_number.yarbocadenceeq_plan3_min_gap_hours
                name: Slot 3 min gap (h)
              - entity: input_number.yarbocadenceeq_plan3_cut_hours
                name: Slot 3 avg run time (h)
              - entity: input_number.yarbocadenceeq_plan3_buffer_hours
                name: Slot 3 buffer (h)

              - type: section
                label: Slot 4
              - entity: input_boolean.yarbocadenceeq_plan4_enabled
                name: Slot 4 enabled
              - entity: input_text.yarbocadenceeq_plan4_yarbo_plan
                name: Slot 4 Yarbo plan name
              - entity: input_datetime.yarbocadenceeq_plan4_earliest_start
                name: Slot 4 earliest start time
              - entity: input_datetime.yarbocadenceeq_plan4_latest_start
                name: Slot 4 latest start time
              - entity: input_datetime.yarbocadenceeq_plan4_last_cut
                name: Slot 4 last cut completed
              - entity: input_number.yarbocadenceeq_plan4_interval_hours
                name: Slot 4 target interval (h)
              - entity: input_number.yarbocadenceeq_plan4_min_gap_hours
                name: Slot 4 min gap (h)
              - entity: input_number.yarbocadenceeq_plan4_cut_hours
                name: Slot 4 avg run time (h)
              - entity: input_number.yarbocadenceeq_plan4_buffer_hours
                name: Slot 4 buffer (h)

              - type: section
                label: Heat / Sun
              - entity: input_number.yarbocadenceeq_hot_temp_threshold_c
                name: Hot temp threshold
              - entity: input_number.yarbocadenceeq_sun_buffer_morning_hours
                name: Sun buffer (morning)
              - entity: input_number.yarbocadenceeq_sun_buffer_evening_hours
                name: Sun buffer (evening)
              - entity: input_select.yarbocadenceeq_heat_resume_mode
                name: Heat resume mode

              - type: section
                label: Yarbo Rain sensor
              - entity: input_number.yarbocadenceeq_rain_sensor_threshold
                name: Onboard rain trigger value
              - entity: input_number.yarbocadenceeq_rain_debounce_seconds
                name: Rain must persist (s)

              - type: section
                label: Moisture sensors
              - entity: input_boolean.yarbocadenceeq_use_moisture
                name: Use moisture sensors
              - entity: input_number.yarbocadenceeq_moisture_max_percent
                name: Max allowed (wet block %)
              - entity: input_text.yarbocadenceeq_moisture_sensors
                name: Moisture sensor entity IDs

              - type: section
                label: Dock GPS match (0.5 m from dock)
              - entity: input_boolean.yarbocadenceeq_use_dock_coords
                name: Require dock GPS match
              - entity: input_number.yarbocadenceeq_dock_latitude
                name: Dock latitude
              - entity: input_number.yarbocadenceeq_dock_longitude
                name: Dock longitude
              - entity: sensor.yarbocadenceeq_dock_distance_display
                name: Live distance from dock

      # =====================================================================
      # MIDDLE COLUMN: countdown, gauges, go/no-go, decision metrics
      # =====================================================================
      - type: vertical-stack
        cards:

          # ---- BIG COUNTDOWN --------------------------------------------------
          - type: markdown
            content: >
              {% set t = states('sensor.yarbocadenceeq_next_cut_prediction') %}

              {% if t in ['unknown','unavailable'] or not t %}
              ## 🤖 Next cut: _calculating…_
              {% else %}
              {% set secs = (as_timestamp(t) - as_timestamp(now())) | int %}
              {% set running = states('sensor.yarbocadenceeq_auto_plan_status') in ['Cleaning','Calculating Route','Heading to Area','Waypoint Navigation'] %}
              {% if running %}
              # 🟢 Mowing Now - Battery {{ states('sensor.yarbocadenceeq_battery') }}%
              {% elif secs <= 0 %}
              # ⏱️ Next cut: **due now**
              {% set ns2_slot = states('sensor.yarbocadenceeq_next_queued_slot') | int(0) %}
              {% set ns2_plan = states('input_text.yarbocadenceeq_plan' ~ ns2_slot ~ '_yarbo_plan') | trim if ns2_slot > 0 else '' %}
              {% if ns2_slot > 0 %}
              Slot {{ ns2_slot }}{% if ns2_plan %} · {{ ns2_plan }}{% endif %}
              {% endif %}
              {% else %}
              {% set d = (secs // 86400) %}
              {% set h = (secs % 86400) // 3600 %}
              {% set m = (secs % 3600) // 60 %}
              # ⏱️ Next cut in
              # {% if d > 0 %}{{ d }}d {% endif %}{{ h }}h {{ m }}m
              Predicted: **{{ as_timestamp(t) | timestamp_custom('%a %b %-d, %-I:%M %p') }}**
              {% set ns2_slot = states('sensor.yarbocadenceeq_next_queued_slot') | int(0) %}
              {% set ns2_plan = states('input_text.yarbocadenceeq_plan' ~ ns2_slot ~ '_yarbo_plan') | trim if ns2_slot > 0 else '' %}
              {% if ns2_slot > 0 %}
              Slot {{ ns2_slot }}{% if ns2_plan %} · {{ ns2_plan }}{% endif %}
              {% endif %}
              {% endif %}
              {% endif %}

          # ---- GAUGES: moisture + battery ------------------------------------
          # NOTE: core HA gauges support only 3 colors (red/yellow/green) with
          # static thresholds — they can't read the dispatch-min slider or show a
          # 4th shade. Bands here: red <=30, yellow 30-60, green >=60.
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.yarbocadenceeq_moisture_max
                name: Soil (wettest)
                unit: "%"
                min: 0
                max: 100
                needle: true
                severity:
                  green: 0
                  yellow: 50
                  red: 60
              - type: gauge
                entity: sensor.yarbocadenceeq_battery
                name: Battery
                unit: "%"
                min: 0
                max: 100
                needle: true
                severity:
                  red: 0
                  yellow: 30
                  green: 60

          # ---- PLAN SCHEDULE SUMMARY -----------------------------------------
          - type: markdown
            content: >
              ### Plan schedule
              {%- set active = states('input_number.yarbocadenceeq_active_plan_slot') | int(0) -%}
              {%- set next_slot = states('sensor.yarbocadenceeq_next_queued_slot') | int(0) -%}
              {%- if active > 0 %}
              **▶ Running: Slot {{ active }}**
              {%- elif next_slot > 0 %}
              **Next up: Slot {{ next_slot }} — {{ states('input_text.yarbocadenceeq_plan' ~ next_slot ~ '_yarbo_plan') | trim }}**
              {%- endif %}

              {%- set slug = states('sensor.yarbocadenceeq_device_slug_effective') -%}
              {%- set opts = state_attr('select.' ~ slug ~ '_plan_select', 'options') or [] -%}
              {%- set to_rain = states('sensor.yarbocadenceeq_hours_until_rain') | float(999) -%}
              {%- set emg = states('input_number.yarbocadenceeq_rain_emergency_hours') | float(3.0) -%}
              {%- set ns = namespace(any=false) -%}
              {%- for n in [1,2,3,4] -%}
              {%- set en = is_state('input_boolean.yarbocadenceeq_plan' ~ n ~ '_enabled','on') -%}
              {%- set pn = states('input_text.yarbocadenceeq_plan' ~ n ~ '_yarbo_plan') | trim -%}
              {%- if en and pn not in ['','unknown','unavailable'] -%}
              {%- set ns.any = true -%}
              {%- set pred = states('sensor.yarbocadenceeq_plan_' ~ n ~ '_next_cut_prediction') -%}
              {%- set lc = states('input_datetime.yarbocadenceeq_plan' ~ n ~ '_last_cut') -%}
              {%- set es = states('input_datetime.yarbocadenceeq_plan' ~ n ~ '_earliest_start') -%}
              {%- set ls = states('input_datetime.yarbocadenceeq_plan' ~ n ~ '_latest_start') -%}
              {%- set lc_ts = as_timestamp(lc) if lc not in ['unknown','unavailable',''] else 0 -%}
              {%- set interval = states('input_number.yarbocadenceeq_plan' ~ n ~ '_interval_hours') | float(48) -%}
              {%- set gap = states('input_number.yarbocadenceeq_plan' ~ n ~ '_min_gap_hours') | float(24) -%}
              {%- set cut_h = states('input_number.yarbocadenceeq_plan' ~ n ~ '_cut_hours') | float(3.5) -%}
              {%- set buf = states('input_number.yarbocadenceeq_plan' ~ n ~ '_buffer_hours') | float(1.0) -%}
              {%- set since = ((as_timestamp(now()) - lc_ts) / 3600) | round(0) | int if lc_ts > 0 else 999 -%}
              {%- set es_parts = es.split(':') if es not in ['unknown','unavailable',''] else ['0','0'] -%}
              {%- set es_mins = (es_parts[0] | int(0)) * 60 + (es_parts[1] | int(0)) -%}
              {%- set now_mins = now().hour * 60 + now().minute -%}
              {%- set past_earliest = now_mins >= es_mins or es_mins == 0 -%}
              {%- set ls_parts = ls.split(':') if ls not in ['unknown','unavailable',''] else ['0','0'] -%}
              {%- set ls_mins = (ls_parts[0] | int(0)) * 60 + (ls_parts[1] | int(0)) -%}
              {%- set before_latest = now_mins <= ls_mins or ls_mins == 0 -%}
              {%- set trig = [cut_h + buf, emg] | max -%}
              {%- set due_normal = since >= interval and past_earliest and before_latest -%}
              {%- set due_rain = to_rain <= trig and to_rain >= cut_h and since >= gap and past_earliest and before_latest -%}
              {%- set plan_valid = opts | length > 0 and pn in opts -%}
              {%- set eligible = plan_valid and (due_normal or due_rain) -%}
              {%- set due = pred not in ['unknown','unavailable'] and as_timestamp(pred) <= as_timestamp(now()) -%}
              {%- set marker = '⏭ ' if (n == next_slot and active == 0) else '' -%}
              {%- set due_badge = ' 🔴 **DUE NOW**' if due else '' %}
              **{{ marker }}Slot {{ n }}** — {{ pn }}{{ due_badge }}
              Last: {{ as_timestamp(lc) | timestamp_custom('%a %b %-d, %-I:%M %p') if lc not in ['unknown','unavailable',''] else 'never' }} ({{ since }}h ago) · Next: {{ '**now**' if due else (as_timestamp(pred) | timestamp_custom('%a %-I:%M %p') if pred not in ['unknown','unavailable'] else '?') }} · Window: {{ es[:5] if es not in ['unknown','unavailable'] else 'any' }}–{{ ls[:5] if ls not in ['unknown','unavailable'] else 'any' }}
              {%- if not plan_valid %}
              ⚠️ Plan "{{ pn }}" not in Yarbo's list — check name
              {%- elif not past_earliest %}
              ⏰ Before earliest start ({{ es[:5] }}) — {{ es_mins - now_mins }} min to go
              {%- elif not before_latest %}
              🕐 Past latest start ({{ ls[:5] }}) — waiting for tomorrow
              {%- elif not due_normal and not due_rain %}
              ⏳ {{ (interval - since) | round(0) | int }}h remaining of {{ interval | int }}h interval ({{ since }}h elapsed)
              {%- elif eligible -%}
              {%- set blocker = states('sensor.yarbocadenceeq_cut_blocker') %}
              {{ '✅ Eligible — dispatching next scheduler run' if blocker == 'OK' else '🔑 Eligible — held by: ' ~ blocker }}
              {%- endif %}
              {{ '\n\n' }}
              {%- endif -%}
              {%- endfor %}
              {%- if not ns.any %}
              _No plans configured. Add Yarbo plan names to the slot settings below._
              {%- endif %}

          # ---- GO / NO-GO (multi-row status) ---------------------------------
          - type: markdown
            content: >
              {% set running = states('sensor.yarbocadenceeq_auto_plan_status') in ['Cleaning','Calculating Route','Heading to Area','Waypoint Navigation'] %}
              {% set heat = is_state('input_boolean.yarbocadenceeq_heat_paused','on') %}
              {% set b = states('sensor.yarbocadenceeq_cut_blocker') %}
              {% set ok = (b == 'OK') %}
              {% if running %}
              ### 🟢 Mowing
              **Plan:**  {{ states('sensor.yarbocadenceeq_active_plan_name') }}
              {% elif heat %}
              ### ⏸️ Heat-paused
              **Status:**  waiting to resume
              {% elif ok %}
              ### ✅ OK to cut now
              **Status:**  Nominal — clear to cut
              {% elif b in ['unknown','unavailable'] %}
              ### ⏳ Updating…
              **Status:**  updating…
              {% else %}
              ### ⛔ Not cutting
              **Status:**  Blocked
              {% for r in b.split(', ') %}
              - {{ r }}
              {% endfor %}
              {% endif %}

          # ---- DECISION METRICS ----------------------------------------------
          - type: entities
            title: Decision metrics
            show_header_toggle: false
            state_color: true
            entities:
              - type: section
                label: Yarbo
              - entity: binary_sensor.yarbocadenceeq_yarbo_nominal
                name: ☑️ Yarbo nominal
              - entity: binary_sensor.yarbocadenceeq_online
                name: Online
              - entity: binary_sensor.yarbocadenceeq_on_dock_sticky
                name: Home (on dock)
              - entity: sensor.yarbocadenceeq_battery
                name: Battery
              - entity: sensor.yarbocadenceeq_rtk_signal
                name: RTK / GPS signal
              - entity: binary_sensor.yarbocadenceeq_onboard_rain_detected
                name: Onboard rain detected

              - type: section
                label: Moisture
              - entity: binary_sensor.yarbocadenceeq_is_dry
                name: ☑️ Moisture nominal
              - entity: sensor.yarbocadenceeq_wettest_zone
                name: Wettest zone

              - type: section
                label: Weather
              - entity: binary_sensor.yarbocadenceeq_weather_nominal
                name: ☑️ Weather conditions nominal
              - entity: sensor.yarbocadenceeq_current_temp_f
                name: Current temp
              - entity: sensor.yarbocadenceeq_today_high_f
                name: Today's high
              - entity: sensor.yarbocadenceeq_current_rain_probability_display
                name: Current rain probability
              - entity: sensor.yarbocadenceeq_hours_until_rain_display
                name: Hours until rain
              - entity: sensor.yarbocadenceeq_rain_clears_display
                name: Hours until after rain
              - entity: sensor.yarbocadenceeq_rain_trigger_hours
                name: Pre-rain trigger threshold
              - entity: binary_sensor.yarbocadenceeq_rain_detected
                name: Rain detected now
              - entity: binary_sensor.yarbocadenceeq_should_cut_ahead_of_rain
                name: Pre-rain cut due

              - type: section
                label: Heat / Sun
              - entity: binary_sensor.yarbocadenceeq_temp_safe_now
                name: ☑️ Temperature nominal
              - entity: sensor.yarbocadenceeq_in_sun_window_text
                name: In direct-sun window
              - entity: binary_sensor.yarbocadenceeq_heat_paused_state
                name: Heat-paused
              - entity: sun.sun
                name: Sun

      # =====================================================================
      # RIGHT COLUMN: hardware state, then commands + maintenance
      # =====================================================================
      - type: vertical-stack
        cards:

          # ---- YARBO HARDWARE STATE ------------------------------------------
          - type: entities
            title: Yarbo state
            show_header_toggle: false
            state_color: true
            entities:
              - entity: binary_sensor.yarbocadenceeq_charging
                name: Actively charging
              - entity: sensor.yarbocadenceeq_charging_power_display
                name: Charging power
              - entity: sensor.yarbocadenceeq_head_type
                name: Head type
              - entity: sensor.yarbocadenceeq_plan_phase
                name: Plan phase
              - entity: sensor.yarbocadenceeq_auto_plan_pause_status
                name: Pause reason
              - entity: sensor.yarbocadenceeq_recharging_status
                name: Recharging status
              - entity: sensor.yarbocadenceeq_activity
                name: Activity (awake/standby)
              - entity: sensor.yarbocadenceeq_gps_satellites
                name: GPS satellites
              - entity: sensor.yarbocadenceeq_network
                name: Network (must be Halow)
              - entity: sensor.yarbocadenceeq_rain_sensor
                name: Onboard rain value (live)
              - entity: sensor.yarbocadenceeq_onboard_rain_mean
                name: Onboard rain (avg)

          # ---- COMMANDS & MAINTENANCE (merged) -------------------------------
          - type: entities
            title: Commands & maintenance
            show_header_toggle: false
            entities:
              - entity: script.yarbocadenceeq_cmd_start
                name: ▶️ Start (default plan)
              - entity: script.yarbocadenceeq_cmd_stop
                name: ⏸️ Stop (freeze in place)
              - entity: script.yarbocadenceeq_cmd_resume
                name: ⏯️ Resume
              - entity: script.yarbocadenceeq_cmd_go_home
                name: 🏠 Go home (return to charge)
              - entity: script.yarbocadenceeq_refresh_all
                name: 🔁 Refresh all Yarbo data
              - type: divider
              - entity: input_boolean.yarbocadenceeq_reset_defaults
                name: ♻️ Reset tuning to recommended (flips back)
              - entity: input_boolean.yarbocadenceeq_show_homekit_help
                name: ❓ Show HomeKit setup help
              - entity: input_boolean.yarbocadenceeq_show_moisture_help
                name: ❓ Show moisture setup help

          # ---- HOMEKIT HELP (toggled above) ----------------------------------
          - type: conditional
            conditions:
              - entity: input_boolean.yarbocadenceeq_show_homekit_help
                state: "on"
            card:
              type: markdown
              content: >
                ### Expose these to HomeKit

                Add exactly these entity IDs to the HomeKit integration's include
                filter. Scripts show up in the Home app as **buttons**; the master
                shows up as a **switch**.

                **Master switch:**

                - `input_boolean.yarbocadenceeq_auto_enabled` — turns the whole automation on/off

                **Commands:**

                - `script.yarbocadenceeq_cmd_start` — start a cut
                - `script.yarbocadenceeq_cmd_stop` — pause / freeze in place
                - `script.yarbocadenceeq_cmd_resume` — resume
                - `script.yarbocadenceeq_cmd_go_home` — return to dock
                - `script.yarbocadenceeq_refresh_all` — refresh all Yarbo data

                Leave everything else out of HomeKit — the sensors and tuning helpers
                don't need to be exposed.

          # ---- MOISTURE HELP (toggled above) ---------------------------------
          - type: conditional
            conditions:
              - entity: input_boolean.yarbocadenceeq_show_moisture_help
                state: "on"
            card:
              type: markdown
              content: >
                ### Moisture sensor setup

                The cut is gated on soil moisture. Configure it for **however many
                sensors you have (0, 1, 3, 5…)**:

                1. **No soil sensors?** Turn **Use moisture sensors** OFF. Moisture
                will never block a cut.

                2. **Have sensors?** Leave it ON and fill **Moisture sensor entity
                IDs** with a **comma-separated** list of their entity IDs, e.g.
                `sensor.soil_1, sensor.soil_2, sensor.soil_3`.

                **Finding the IDs:** Settings → Devices & Services → your sensor
                gateway (e.g. Ecowitt) → click the device → each soil-moisture entity
                shows its `sensor.…` ID. Or Developer Tools → States, filter "soil".

                **How it gates:** the package takes the **wettest** of the listed
                sensors and blocks if it's at/above the *Max allowed* threshold.
                Unavailable sensors are skipped. **If the gate is ON but every listed
                sensor is unavailable, the cut is BLOCKED and you get a notification** —
                moisture is treated as a primary safety gate, not a soft signal.

  # ###########################################################################
  # VIEW 2 — PHONE (single column, priority-ordered)
  # ###########################################################################
  - title: Phone
    path: phone
    icon: mdi:cellphone
    badges: []
    cards:

      # 1) What's happening / when -------------------------------------------
      - type: markdown
        content: >
          {% set t = states('sensor.yarbocadenceeq_next_cut_prediction') %}

          {% if t in ['unknown','unavailable'] or not t %}
          ## 🤖 Next cut: _calculating…_
          {% else %}
          {% set secs = (as_timestamp(t) - as_timestamp(now())) | int %}
          {% set running = states('sensor.yarbocadenceeq_auto_plan_status') in ['Cleaning','Calculating Route','Heading to Area','Waypoint Navigation'] %}
          {% if running %}
          # 🟢 Mowing Now - Battery {{ states('sensor.yarbocadenceeq_battery') }}%
          {% elif secs <= 0 %}
          # ⏱️ Next cut: **due now**
          {% set ns2_slot = states('sensor.yarbocadenceeq_next_queued_slot') | int(0) %}
          {% set ns2_plan = states('input_text.yarbocadenceeq_plan' ~ ns2_slot ~ '_yarbo_plan') | trim if ns2_slot > 0 else '' %}
          {% if ns2_slot > 0 %}Slot {{ ns2_slot }}{% if ns2_plan %} · {{ ns2_plan }}{% endif %}{% endif %}
          {% else %}
          {% set d = (secs // 86400) %}
          {% set h = (secs % 86400) // 3600 %}
          {% set m = (secs % 3600) // 60 %}
          # ⏱️ Next cut in {% if d > 0 %}{{ d }}d {% endif %}{{ h }}h {{ m }}m
          Predicted: **{{ as_timestamp(t) | timestamp_custom('%a %b %-d, %-I:%M %p') }}**
          {% set ns2_slot = states('sensor.yarbocadenceeq_next_queued_slot') | int(0) %}
          {% set ns2_plan = states('input_text.yarbocadenceeq_plan' ~ ns2_slot ~ '_yarbo_plan') | trim if ns2_slot > 0 else '' %}
          {% if ns2_slot > 0 %}Slot {{ ns2_slot }}{% if ns2_plan %} · {{ ns2_plan }}{% endif %}{% endif %}
          {% endif %}
          {% endif %}

      # 2) Go / No-Go with reasons -------------------------------------------
      - type: markdown
        content: >
          {% set running = states('sensor.yarbocadenceeq_auto_plan_status') in ['Cleaning','Calculating Route','Heading to Area','Waypoint Navigation'] %}
          {% set heat = is_state('input_boolean.yarbocadenceeq_heat_paused','on') %}
          {% set b = states('sensor.yarbocadenceeq_cut_blocker') %}
          {% set ok = (b == 'OK') %}
          {% if running %}
          ### 🟢 Mowing
          **Plan:**  {{ states('sensor.yarbocadenceeq_active_plan_name') }}
          {% elif heat %}
          ### ⏸️ Heat-paused
          **Status:**  waiting to resume
          {% elif ok %}
          ### ✅ OK to cut now
          **Status:**  Nominal — clear to cut
          {% elif b in ['unknown','unavailable'] %}
          ### ⏳ Updating…
          **Status:**  updating…
          {% else %}
          ### ⛔ Not cutting
          **Status:**  Blocked
          {% for r in b.split(', ') %}
          - {{ r }}
          {% endfor %}
          {% endif %}

